<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>PAWS Interaction Log</title>

    <link href="css/common.css" rel="stylesheet" type="text/css">
    <link href="css/log.css" rel="stylesheet" type="text/css">
</head>
<body>
     <div class="wrapper">
     <header>
          <div id="sort-bar">
               <img src="images/kitty.svg" class="sort-icon" group="cat" id="cat-button" name="cat-button" title="Switch to cat data"
                    onclick="animalHandler(event);"
                    onmouseover="this.src='images/kitty-selected.svg';"
                    onmouseout="this.src='images/kitty.svg';">
               <img src="images/puppy.svg" class="sort-icon" group="dog" id="dog-button" name="dog-button" title="Sort list by name (reverse order)"
                    onclick="animalHandler(event);"
                    onmouseover="this.src='images/puppy-selected.svg';"
                    onmouseout="this.src='images/puppy.svg';">
               <img src="images/color.svg" class="sort-icon" name="color-button" title="Sort list by color"
                    onclick="sortByColor(event)"
                    onmouseover="this.src='images/color-selected.svg';"
                    onmouseout="this.src='images/color.svg';">
               <img src="images/clock.svg" class="sort-icon" id="clock-button" title="Sort list by accumulated length of walks"
                    onclick="sortByTime(event)"
                    onmouseover="this.src='images/clock-selected.svg';"
                    onmouseout="this.src='images/clock.svg';">
               <img src="images/calendar.svg" class="sort-icon" name="calendar-button" title="Sort list by most recent date"
                    onclick="sortByMostRecent(event)"
                    onmouseover="this.src='images/calendar-selected.svg';"
                    onmouseout="this.src='images/calendar.svg';">
          </div>
     </header>

     <main id="main"></main>
     <div class="push"></div>
     </div>
     <footer></footer>
</body>

<script language="JavaScript" src="sort/sort.js"></script>
<script language="JavaScript" src="scripts/common.js"></script>
<script language="JavaScript" src="scripts/sidebar.js"></script>
<script language="JavaScript" src="scripts/log.js"></script>
</html>
