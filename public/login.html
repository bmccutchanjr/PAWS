<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>PAWS Log In</title>

    <link href="css/common.css" rel="stylesheet" type="text/css">
    <link href="css/login.css" rel="stylesheet" type="text/css">
</head>
<body>
    <div class="wrapper">
        <header>PAWS</header>
        <main>
            Please log in:
            <div class="login-div active" id=user-input>
                <input id=email name=email o-n-c-h-a-n-g-e="validateUser(event)" onfocus="select()" placeholder="Your email address or Volgistics Id" type=text>
                <!-- or<br> -->
                <!-- <input id=volgistics name=volgistics onchange="validateUser(event)" onfocus="select()" placeholder="your Volgistics Id" type=text> -->
            </div>
            <div class=login-div id=password-input>
                <input id=password name=password onchange="validatePassword(event)" onfocus="select()" placeholder="password" type=password>
            </div>
            <div class=login-div id=submit-password>
                <!-- <a class=modal-option href="#" onclick="handleLoginOption(event)">Log In</a> -->
                <button onclick="handleLoginOption(event)">Log In</button>
                <div class=spacer></div>
                <button class=disabled>I Forgot My Password</button>
            </div>
        </main>
        <div class="push"></div>
    </div>
    <footer></footer>
</body>

<script language="JavaScript" src="scripts/common.js"></script>
<script language="JavaScript" src="scripts/login.js"></script>
</html>
