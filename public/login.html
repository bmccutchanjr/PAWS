<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>PAWS Log In</title>

    <link href="css/common.css" rel="stylesheet" type="text/css">
    <link href="css/login.css" rel="stylesheet" type="text/css">
</head>
<body>
    <div class="wrapper">
        <header>PAWS</header>
        <main>
            Please log in:
            <div class=login-div id=user-input>
                <input name=user placeholder="your email address" type=text>
                or<br>
                <input name=volgistics placeholder="your Volgistics Id" type=text>
            </div>
            <div class=login-div id=password-input>
                <input name=password placeholder="password" type=password>
            </div>
            <div class=login-div id=submit-password>
                <button>Log In</button>
                <button>I Forgot My Password</button>
            </div>
        </main>
        <div class="push"></div>
    </div>

    <footer><div class="left">PAWS Log In</div><div class="right">&copy All Rights Reserved</div></footer>
</body>

<script language="JavaScript" src="scripts/login.js"></script>
</html>
