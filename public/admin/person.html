<head>
    <link href="../css/common.css" rel="stylesheet" type="text/css">
    <style>
        /*  style used by more than one element or function         */
        /*                                                          */

        .error
        {
            border-color: red;
            color: red;
        }

        .error-text
        {
            color: red;
        }

        .frame-section
        {   border: 1px solid grey;
            border-radius: 3px;
            padding: 5px;
            margin: 0px;
            vertical-align: bottom;
        }

        .menu-option
        {   
            /* background: rgba(255,0,0,0.5); */
            display: inline-block;
            padding: 2px;
            width: auto;
        }

        #permissions
        {
            border: none;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            padding: 0px;
        }

        .permissions-div
        {
            border: 1px solid grey;
            border-radius: 3px;
            flex-grow: 0;
            flex-shrink: 0;
            padding: 5px;
            width: 32%;
        }

        .spacer
        {   display: inline-block;
            width: 20px;
        }

        /*  style used by elements in the the names section         */
        /*                                                          */

        .email-input
        {
            width: 50%;
        }

        .name-div
        {
            display: flex;
            justify-content: space-between;
        }

        .name-input
        {
            flex-grow: 0;
            flex-shrink: 0;
            width: 32%;
        }

        .create-option,
        .create-spacer,
        .change-option,
        .change-spacer,
        .delete-option
        {
            display: none;
        }

        /*  style used by elements in the the password section      */
        /*                                                          */

        #password-section
        {
            display: none;
        }
    </style>
</head>
<body>
    <div id=frame-wrapper>
        <section class=frame-section id=lock-section>
            <a class=menu-option href=# id=lock-option name=lock onclick="submitLock(event);">Lock This User</a>
            <a class=menu-option href=# id=unlock-option name=unlock onclick="submitLock(event);">Unlock This User</a>
        </section>
        <form class=frame-section id=name-section name=names>
            <div class=name-div>
                <input class=name-input id=name-given name=given onchange="nameValidation(event);" onfocus="nameClearError(event)" placeholder="(given name is required)" readonly>
                <input class=name-input id=name-middle name=middle onchange="nameValidation(event);" onfocus="nameClearError(event)" placeholder="(middle name)" readonly>
                <input class=name-input id=name-surname name=surname onchange="nameValidation(event);" onfocus="nameClearError(event)" placeholder="(surname is required)" readonly>
            </div>
            <input class=email-input id=email-input name=email onchange="emailValidation(event);" onfocus="nameClearError(event)" placeholder="(email address is required)" readonly>
            <div>
                <a class=menu-option href=# id=create-option onclick="submitNames(event)" name=create>Submit</a>
                <a class=menu-option href=# id=change-option onclick="submitNames(event)" name=change>Submit Changes</a>
                <div class=spacer id=change-spacer></div>
                <a class=menu-option href=# id=delete-option onclick="submitDeactivate(event)" name=delete>Delete/Deactivate</a>
            </div>
        </form>
        <section class="frame-section" id=password-section>
            <input id=password name=password onfocus="passwordClearError(event)" placeholder="(new password)">
            <a class=menu-option href=# id=password-option name=password onclick="submitPassword(event)">Change Password</a>
        </section>
        <section class="frame-section" id=permissions>
            <div class=permissions-div id=admin-privledges>
                <p>Admin Privledges</p>
            </div>
            <div class=permissions-div id=cat-permissions>
                <p>Cat Permissions</p>
            </div>
            <div class=permissions-div id=dog-permissions>
                <p>Dog Permissions</p>
            </div>
        </section>
    </div>
</body>

<script language=JavaScript src="../scripts/common.js"></script>
<script language=JavaScript>
    ////////////////////////////////////////////////////////////////////////////////////////////////////

    //  These functions are required to get data from the server and put it on the screen.

    function doAdmin (data)
    {
        const section = document.getElementById ("admin-privledges");

        data.privledges.forEach (p =>
        {
            const div = configureElement ("div",
                {
                },
                section);

            const input = configureElement ("input",
                {
                    "name": p.adminId,
                    "selected": p.allow == true ? true : false,
                    "type": "checkbox",
                },
                div);

            if (p.allow == true) input.setAttribute ("checked", "checked");
            if (data.allow != true) input.setAttribute ("disabled", "true");

            configureElement ("label",
                {
                    "for": p.adminId,
                    "innerText": p.privledge
                },
                div);
        });

        if (data.allow == true)
        {   configureElement ("a",
                {
                    "class": "menu-option",
                    "href": "#",
                    "id": "submit-privledges",
                    "innerText": "SUBMIT",
                    "onclick": "submitPrivledges(event);"
                },
                section);
        }
    }

    function doColors (data, species)
    {
        const section = document.getElementById (species + "-permissions");

        data.permissions.forEach (p =>
        {
            const div = configureElement ("div",
                {
                },
                section);

            const input = configureElement ("input",
                {
                    "name": p.color,
                    "type": "checkbox",
                },
                div);

            if (p.species == species)
            {
                if (p["species"] == true) input.setAttribute ("checked", "");
                if (data.allow != true) input.setAttribute ("disabled", "");
            }

            configureElement ("label",
                {
                    "for": p.color,
                    "innerText": p.color
                },
                div);
        });

        if (data.allow == true)
        {   configureElement ("a",
                {
                    "class": "menu-option",
                    "href": "#",
                    "id": "submit-privledges",
                    "innerText": "SUBMIT",
                    "onclick": "submitColors(event);",
                    "species": species
                },
                section);
        }
    }

    function doPassword (allow)
    {
        if (!allow)
            document.getElementById ("password-section").remove ();
        else
            if (!createMode) document.getElementById ("password-section").style.display = "block";
    }

    function allowPersonInputs ()
    {   document.getElementById ("name-given").removeAttribute ("readonly");
        document.getElementById ("name-middle").removeAttribute ("readonly");
        document.getElementById ("name-surname").removeAttribute ("readonly");
        document.getElementById ("email-input").removeAttribute ("readonly");
    }

    function doNewPerson ()
    {   //  Configure the screen to create a new user.  Simply, all sections except the personal information section
        //  should be hidden (but not removed from the DOM).  The submit option for new users should be visible and
        //  the change and deactivate options should be hidden (but not removed from the DOM).  There is no initial
        //  data for the input fields.

        document.getElementById ("lock-section").style.display = "none";
        document.getElementById ("password-section").style.display = "none";
        document.getElementById ("permissions").style.display = "none";

        document.getElementById ("create-option").style.display = "inline-block";
        document.getElementById ("change-option").style.display = "none";
        document.getElementById ("delete-option").style.display = "none";

        allowPersonInputs ();
    }

    function doPersonData (data)
    {
        if (data.results[0].given != "")
        {   
            document.names.given.value = data.results[0].given;
            document.getElementById ("name-given").setAttribute ("value", data.results[0].given);
        }

        if (data.results.middle != "")
        {   
            document.names.middle.value = data.results[0].middle;
            document.getElementById ("name-middle").setAttribute ("value", data.results[0].middle);
        }

        if (data.results.surname != "")
        {   
            document.names.surname.value = data.results[0].surname;
            document.getElementById ("name-surname").setAttribute ("value", data.results[0].surname);
        }

        if (data.results.email != "")
        {   
            document.names.email.value = data.results[0].email;
            document.getElementById ("email-input").setAttribute ("value", data.results[0].email);
        }

        if (data.results.lock_code == undefined)
            hideOption (document.getElementById ("unlock-option"));
        else
            hideOption (document.getElementById ("lock-option"));

        document.getElementById ("create-option").remove();

        if (!data.change)
        {   document.getElementById ("change-option").remove();
            document.getElementById ("change-spacer").remove();
        }
        else
            allowPersonInputs ();
    }

    function hideOption (option)
    {   option.style.display = "none";
    }

    function spaceSections ()
    {   //  Who knew?!  A top margin on the first element, or a bottom margin on the last element, in an <iframe>
        //  forces scrollbars on the <iframe> that cannot be removed.  Even after the <iframe> is resized to the
        //  clientHeight property of the wrapper.  Moreover, the scrollbars remain even if the <iframe> is intentionally
        //  over-sized to compensate.
        //
        //  All of the content is visible in the <iframe>.  It only scrolls by the combined height of the margins.
        //
        //  So to space out the sections, I have to do something promatically after the page is loaded.  Since the
        //  actual height of individual sections can't be determined until the APIs return the data to render, I choose
        //  to do this with top margins which will always be the same before or after the content of the section is rendered.
        //
        //  But it can't go on the first section.

        const sections = document.getElementsByClassName ("frame-section");

        const length = sections.length;
        let firstX = createMode ? 2 : 1;
        for (let x=firstX; x<length; x++)
        {   sections[x].style.marginTop = "10px";
        }
    }

    let createMode = false;

    function setCreateMode ()
    {   if (getCookie ("peopleId") == "0") createMode = true;
    }

    document.addEventListener ("DOMContentLoaded", event =>
    {
        setCreateMode ();

        spaceSections ();

        AJAX ("GET", "/api/people/getAdminPrivledges/" + getCookie ("peopleId"), xml =>
        {
            if (xml.status == 200)
            {
                doAdmin (JSON.parse(xml.responseText));
            }
            else
            {   alert ("/getAdminPrivledges\n\n" + xml.responseText);
            }
        });

        AJAX ("GET", "/api/people/getAnimalPermissions/" + getCookie ("peopleId"), xml =>
        {
            if (xml.status == 200)
            {
                doColors (JSON.parse(xml.responseText), "cat");
                doColors (JSON.parse(xml.responseText), "dog");
            }
            else
            {   alert ("/getAnimalPermissions\n\n" + xml.responseText);
            }
        });

        AJAX ("GET", "/api/people/hasPasswordPrivledge/" + getCookie ("peopleId"), xml =>
        {
            if (xml.status == 500)
            {   alert ("/hasPasswordPrivledge\n\n" + xml.responseText);
            }
            else
            {
                doPassword (xml.responseText == "true" ? true : false);
            }
        });

        if (createMode)
            doNewPerson ();
        else
        {   AJAX ("GET", "/api/people/getPerson/" + getCookie ("peopleId"), xml =>
            {
                if (xml.status == 200)
                {
                    doPersonData (JSON.parse(xml.responseText));
                }
                else
                {   alert ("/getPerson\n\n" + xml.responseText);
                }
            });
        }

        const observer = new ResizeObserver (entries =>
        {   for (const entry of entries)
            {   if (entry.contentBoxSize)
                {   window.parent.postMessage (document.getElementById("frame-wrapper").clientHeight);
                }
            }
        });

        observer.observe (document.getElementById ("frame-wrapper"));
    })

    ////////////////////////////////////////////////////////////////////////////////////////////////////
    ////////////////////////////////////////////////////////////////////////////////////////////////////

    //  These are event handlers for the <input> elements, used to validate the data.

    // pre-load audio files

    const buzz = new Audio("../audio/buzz.mp3");
    const ting = new Audio("../audio/ting.mp3");

    function playAudio (sound)
    {
        sound.load ();
        sound.play ();
    }

    const errors =
    {   email: false,
        names: false,
        password: false
    }

    function setErrorClass (div, error)
    {
        if (error)
            div.setAttribute ("class", div.getAttribute ("class") + " error");
        else
        {   let classlist = div.getAttribute ("class");
            if (classlist != null) div.setAttribute ("class", div.getAttribute ("class").replace (" error", ""));
        }
    }

    function emailSetError (field, text)
    {
        const section = document.getElementById ("name-section");
        configureElement ("div",
            {
                "class": "error-text",
                "id": "email-error",
                "innerText": text
            },
            section);

        setErrorClass (field, true);
        errors.names = true;
    }

    function emailValidation (event)
    {   event.preventDefault ();

        const email = event.target;

        const value = document.names.email.value.trim();
        if (value == "")
        {   nameSetError (email, "An email address is required");
            return false;
        }

        const indexAt = value.indexOf ("@");
        const indexDot = value.indexOf ("@", indexAt);

        //  No need to test all three error conditions.  They all check that the e-mail address appears to be a valid
        //  format, and they all display the same error message.  There's no need to have the same test on the screen
        //  multiple times.  So if any of them is true, that's enough.

        //  email addresses cannot include spaces

        if (value.indexOf (" ") > 0)
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }

        //  there must be an '@' and it can't be the first character

        if (indexAt < 1)
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }

        //  there must be no more then one '@'

        if (value.indexOf ("@", (indexAt + 1)) != -1)
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }

        //  although there can be dots '.' before the '@', there must be at least one after

        if (indexDot == -1)
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }

        //  the string cannot end with a '.'

        if (value.lastIndexOf (".") == (value.length -1))
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }

        //  there must not be a comma ','

        if (value.indexOf (",") != -1)
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }
    }

    function charTest (char)
    {   
        //  An email address must include both an '@' and period.  Those characters are not errors

        if ((char == "@") || (char == "."))
            return true;

        //  An email address may also include numeric digits

        if (!isNaN (parseInt (char)))
            return true;

        if (char.toLowerCase () == char.toUpperCase ())
            return false;

        return true;
    }

    function emailValidator (email)
    {   const value = document.names.email.value.trim();
        if (value == "")
        {   nameSetError (email, "An email address is required");
            return false;
        }

        const indexAt = value.indexOf ("@");
        const indexDot = value.indexOf ("@", indexAt);

        //  No need to test all three error conditions.  They all check that the e-mail address appears to be a valid
        //  format, and they all display the same error message.  There's no need to have the same test on the screen
        //  multiple times.  So if any of them is true, that's enough.

        //  there must be an '@' and it can't be the first character

        if (indexAt < 1)
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }

        //  there must be no more then one '@'

        if (value.indexOf ("@", (indexAt + 1)) != -1)
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }

        //  although there can be dots '.' before the '@', there must be at least one after

        if (indexDot == -1)
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }

        //  the string cannot end with a '.'

        if (value.lastIndexOf (".") == (value.length -1))
        {   nameSetError (email, "This does not appear to be a valid email address");
            return false;
        }

        //  and finally check for invalid characters in the name

        let length = value.length;
        for (let x=0; x<length; x++)
        {
             if (!charTest (value.charAt (x)))
            {   nameSetError (email, "This does not appear to be a valid email address");
                return false;
            }
        }

        return true;
    }

    function emailValidation (event)
    {   event.preventDefault ();

        const email = event.target;
        
        emailValidator (email);
    }

    function nameClearError (event)
    {   event.preventDefault ();

        const input = event.target;
        input.select();
        const error = document.getElementById(input.name + "-error");
        if (error) error.remove();

        setErrorClass (input, false);
        errors.names = false;
    }

    function nameSetError (field, text)
    {
        const section = document.getElementById ("name-section");
        configureElement ("div",
            {
                "class": "error-text",
                "id": field.name + "-error",
                "innerText": text
            },
            section);

        setErrorClass (field, true);
        errors.names = true;
    }

    function nameValidator (input)
    {   const name = input.value;

        if ((input.name != "middle") && (name == ""))
        {   nameSetError (input, input.name + " is required");
            return false;
        }

        let length = name.length;
        for (let x=0; x<length; x++)
        {   //  Names can include titles which means names might also include periods.  Some names, like O'Neal, include
            //  apostrophes ("'").  Other than that, names should only include alpha characters

            if ((name.charAt (x) != "'") && (name.charAt (x) != "."))
                if (name.charAt (x).toLowerCase () == name.charAt (x).toUpperCase ())
                {   nameSetError (input, "This does not appear to be a real name");
                    return false;
                }
        }

        return true;
    }

    function nameValidation (event)
    {   event.preventDefault ();

        const input = event.target;
        nameValidator (input);
    }

    function passwordClearError (text)
    {   event.preventDefault ();

        const input = event.target;
        input.select();
        const section = input.parentNode;
        const errors = section.getElementsByClassName ("error-text");
        const length = errors.length;
        for (let x=0; x<length; x++)
        {
            errors[x].remove ();
        }

        setErrorClass (input, false);
        errors.password = false;
    }

    function passwordSetError (input, text)
    {
        const section = document.getElementById ("password-section");
        configureElement ("div",
            {
                "class": "error-text",
                "innerText": text
            },
            section);

        setErrorClass (input, true);
        errors.password = true;
    }

    function passwordValidation ()
    {   //  This function is called by the 'change password' event handler and not by an 'onchange' event on the
        //  <input> element.  Both are equally effective and efficient, but this way may seem more intuitive to the
        //  user.

        const input = document.getElementById ("password");
        const password = input.value;

        if (password == "")
        {   passwordSetError (input, "A password is required");
            return false;
        }

        if (password.length < 8)
        {   passwordSetError (input, "Password must be at least 8 characters in length");
            return false;
        }

        return true;
    }

    ////////////////////////////////////////////////////////////////////////////////////////////////////
    ////////////////////////////////////////////////////////////////////////////////////////////////////

    //  These are API requests to POST data to the server.

    function submitLock (event)
    {   event.preventDefault ();

        const target = event.target;
        let other = target.name == "lock" ? document.getElementById ("unlock-option") : document.getElementById ("lock-option");
            
        const api = "/api/people/lockPerson/" + getCookie ("peopleId") + "/" + (target.name == "lock" ? "true" : "false");
        AJAX ("GET", api, xml =>
        {
            if (xml.status == 200)
            {
                playAudio (ting);
                target.style.display = "none";
                other.style.display = "inline-block";
                alert ("This user account is now " + (target.name == "lock" ? "locked out" : "unlocked"))
            }
            else
            {
                playAudio (buzz);
                alert (xml.responseText);
            }
        })
    }

    function submitPassword (event)
    {   event.preventDefault ();

        if (errors.password)
        {   playAudio (buzz);
            return false;
        }

        if (passwordValidation ())
        {
            AJAX ("POST", "/api/people/changePassword/" + getCookie ("peopleId"), xml =>
            {
                if (xml.status == 200)
                {
                    playAudio (ting);
                    const input = document.getElementById ("password");
                    input.value = null;
                    alert ("All good!");
                }
                else
                {
                    playAudio (buzz);
                    alert (xml.responseText);
                }
            },
            { "password": password } );
        }
    }

//  01  begins
    function submitNamesChange ()
    {
        const postData =
        {
            user: getCookie ("peopleId"),
            given: document.names.given.value,
            middle: document.names.middle.value,
            surname: document.names.surname.value,
            email: document.names.email.value,
        };

        AJAX ("POST", "/api/people/updatePerson/" + getCookie ("peopleId"), xml =>
        {
            if (xml.status == 200)
            {
                playAudio (ting);
alert (JSON.stringify (xml.responseText, null, 2));
            }
            else
            {
                playAudio (buzz);
                alert (xml.responseText);
            }
        },
        postData);
    }

    function submitNamesNew ()
    {
        const postData =
        {
            given: document.names.given.value,
            middle: document.names.middle.value,
            surname: document.names.surname.value,
            email: document.names.email.value,
        };

        AJAX ("POST", "/api/people/createPerson", xml =>
        {
            if (xml.status == 200)
            {
                playAudio (ting);
alert (JSON.stringify (xml.responseText, null, 2));
            }
            else
            {
                playAudio (buzz);
                alert (xml.responseText);
            }
        },
        postData);
    }
//  01  ends

    function submitNamesValidate ()
    {
        if (!nameValidator (document.names.given)) return false;
        if (!nameValidator (document.names.middle)) return false;
        if (!nameValidator (document.names.surname)) return false;

        if (!emailValidator (document.names.email)) return false;

        return true;
    }

    function submitNames (event)
    {   event.preventDefault ();

        //  this function is disabled if nothing has been changed

        let changed = false;

        let originalValue = document.getElementById ("name-given").getAttribute ("value");
        if (document.names.given.value != originalValue) changed = true;

        originalValue = document.getElementById ("name-middle").getAttribute ("value");
        if (document.names.middle.value != originalValue) changed = true;
        
        originalValue = document.getElementById ("name-surname").getAttribute ("value");
        if (document.names.surname.value != originalValue) changed = true;
        
        originalValue = document.getElementById ("email-input").getAttribute ("value");
        if (document.names.email.value != originalValue) changed = true;
        
        if (!changed)
        {
            playAudio (buzz);
            return false;
        }

        //  this function is disabled if there are errors in the data

        if (!submitNamesValidate ())
        {
            playAudio (buzz);
            return false;
        }

//  01  begins
        if (createMode)
            submitNamesNew ();
        else
            submitNamesChange ();
//  01  ends
    }

    function submitPrivledges (event)
    {   event.preventDefault ();

        let postData = [];

        let changed = 0;

        const admin = document.getElementById ("admin-privledges");
        const privledges = admin.getElementsByTagName ("input");

        const length = privledges.length;
        for (let x=0; x<length; x++)
        {
            const checked = privledges[x].checked;
            const selected = privledges[x].getAttribute ("selected") == "true" ? true : false;

            if ((checked == selected) == false)
            {   changed++;
                let o = { [privledges[x].name] : checked }
                postData.push (o);
            }
        }
        if (changed > 0)
        {
            AJAX ("POST", "/api/people/changeAdminPrivledges/" + getCookie ("peopleId"), xml =>
            {
                if (xml.status == 200)
                {   playAudio (ting);
                    alert ("Successfully updated admin privledges");
                }
                else
                {
                    playAudio (buzz);
                    alert (xml.responseText);
                }
            },
            postData);
        }
    }
</script>
