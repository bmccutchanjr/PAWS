<head>
    <link href="../css/common.css" rel="stylesheet" type="text/css">
    <style>
        .email-input
        {
            width: 50%;
        }

        .error
        {
            border-color: red;
            color: red;
        }

        .error-text
        {
            color: red;
        }

        .frame-section
        {   border: 1px solid grey;
            border-radius: 3px;
            padding: 5px;
            margin: 0px;
        }

        .menu-option
        {   display: inline-block;
            padding: 2px;
            width: auto;
        }

        .name-div
        {
            display: flex;
            justify-content: space-between;
        }

        .name-input
        {
            flex-grow: 0;
            flex-shrink: 0;
            width: 32%;
        }

        .spacer
        {   display: inline-block;
            width: 20px;
        }

        #password-section
        {
            display: none;
        }

        #permissions
        {
            border: none;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            padding: 0px;
        }

        .permissions-div
        {
            border: 1px solid grey;
            border-radius: 3px;
            flex-grow: 0;
            flex-shrink: 0;
            padding: 5px;
            width: 32%;
        }
    </style>
</head>
<body>
    <div id=frame-wrapper>
        <section class=frame-section>
            <a class=menu-option href=# id=lock-option name=lock>LOCK</a>
            <input id=lock-code name=lock-code onchange="validateLock(event);" placeholder="(lock code)" readonly>
            <a class=menu-option href=# id=unlock-option name=lock>UNLOCK</a>
            <div id=lock-error></div>
        </section>
        <form class=frame-section name=names>
            <div class=name-div>
                <input class=name-input id=name-given name=given onchange="validateName(event);" placeholder="(given name)" readonly which=given>
                <input class=name-input id=name-middle name=middle onchange="validateName(event);" placeholder="(middle name)" readonly which=middle>
                <input class=name-input id=name-surname name=surname onchange="validateName(event);" placeholder="(surname)" readonly which=surname>
            </div>
            <div id=name-error></div>
            <input class=email-input id=email-input name=email onchange="validateEmail(event);" placeholder="(email address)" readonly>
            <div id=email-error></div>
            <div>
                <a class=menu-option href=# id=create-option name=create>SUBMIT</a>
                <div class=spacer id=create-spacer></div>
                <a class=menu-option href=# id=change-option name=change>SUBMIT</a>
                <div class=spacer id=change-spacer></div>
                <a class=menu-option href=# id=delete-option name=delete>DELETE/DEACTIVATE</a>
            </div>
        </form>
        <section class="frame-section" id=password-section>
            <input id=password name=password onfocus="passwordClearError(event)" placeholder="New password">
            <a class=menu-option href=# id=password-option name=lock onclick="submitPassword(event)">CHANGE PASSWORD</a>
        </section>
        <section class="frame-section" id=permissions>
            <div class=permissions-div id=admin-privledges>
                <p>Admin Privledges</p>
            </div>
            <div class=permissions-div id=cat-permissions>
                <p>Cat Permissions</p>
            </div>
            <div class=permissions-div id=dog-permissions>
                <p>Dog Permissions</p>
            </div>
        </section>
    </div>
</body>

<script language=JavaScript src="../scripts/common.js"></script>
<script language=JavaScript>
    ////////////////////////////////////////////////////////////////////////////////////////////////////
    ////////////////////////////////////////////////////////////////////////////////////////////////////

    //  These functions are required to get data from the server and put it on the screen.

    function allowPerson ()
    {
        document.getElementById ("name-given").setAttribute ("readonly", false);
        document.getElementById ("name-middle").setAttribute ("readonly", false);
        document.getElementById ("name-surname").setAttribute ("readonly", false);
        document.getElementById ("lock-code").setAttribute ("readonly", false);
    }

    function doAdmin (data)
    {
        const section = document.getElementById ("admin-privledges");

        data.privledges.forEach (p =>
        {
            const div = configureElement ("div",
                {
                },
                section);

            const input = configureElement ("input",
                {
                    "name": p.adminId,
                    "selected": p.allow == true ? true : false,
                    "type": "checkbox",
                },
                div);

            if (p.allow == true) input.setAttribute ("checked", "checked");
            if (data.allow != true) input.setAttribute ("disabled", "true");

            configureElement ("label",
                {
                    "for": p.adminId,
                    "innerText": p.privledge
                },
                div);
        });

        if (data.allow == true)
        {   configureElement ("a",
                {
                    "class": "menu-option",
                    "href": "#",
                    "id": "submit-privledges",
                    "innerText": "SUBMIT",
                    "onclick": "submitPrivledges(event);"
                },
                section);
        }

        postParentMessage ();
    }

    function doColors (data, species)
    {
        const section = document.getElementById (species + "-permissions");

        data.permissions.forEach (p =>
        {
            const div = configureElement ("div",
                {
                },
                section);

            const input = configureElement ("input",
                {
                    "name": p.color,
                    "type": "checkbox",
                },
                div);

            if (p.species == species)
            {
                if (p["species"] == true) input.setAttribute ("checked", "");
                if (data.allow != true) input.setAttribute ("disabled", "");
            }

            configureElement ("label",
                {
                    "for": p.color,
                    "innerText": p.color
                },
                div);
        });

        if (data.allow == true)
        {   configureElement ("a",
                {
                    "class": "menu-option",
                    "href": "#",
                    "id": "submit-privledges",
                    "innerText": "SUBMIT",
                    "onclick": "submitColors(event);",
                    "species": species
                },
                section);
        }

        postParentMessage ();
    }

    function doPassword (allow)
    {
        if (!allow)
            document.getElementById ("password-section").remove ();
        else
            document.getElementById ("password-section").style.display = "block";

        postParentMessage ();
    }

    function doPersonData (data)
    {
        if (!data.results)
        {   document.getElementById ("change-option").remove();
            document.getElementById ("change-spacer").remove();
            document.getElementById ("lock-option").remove();
            document.getElementById ("unlock-option").remove();

            allowPerson ();
        }
        else
        {
            if (data.results[0].given != "") document.names.given.value = data.results[0].given;
            if (data.results.middle != "") document.names.middle.value = data.results[0].middle;
            if (data.results.surname != "") document.names.surname.value = data.results[0].surname;
            if (data.results.email != "") document.names.email.value = data.results[0].email;
            if (data.results.lock_code == undefined)
                document.getElementById ("unlock-option").remove();
            else
            {   document.getElementById ("lock-code").value = data.results[0].lock_code;
                document.getElementById ("lock-code").setAttribute ("readonly", "");
                document.getElementById ("lock-option").remove ();
            }
        }

        if (!data.add)
        {   document.getElementById ("create-option").remove();
            document.getElementById ("create-spacer").remove();
            document.getElementById ("delete-option").remove();
        }

        if (!data.change)
        {   document.getElementById ("change-option").remove();
            document.getElementById ("change-spacer").remove();
            // document.getElementById ("lock-option").remove();
            // document.getElementById ("unlock-option").remove();

            allowPerson ();
        }

        postParentMessage ();
    }

    function getCookie (cookie)
    {   //  Parse the cookie string and return the value of the selected cookie

        let value = undefined;

        const cookies = document.cookie.split (";");
        cookies.forEach (c =>
        {
            const cPrime = c.split ("=");
            if (cPrime[0].trim() == cookie) value = cPrime[1];
        })

        return value;
    }

    function postParentMessage ()
    {   window.parent.postMessage (document.getElementById("frame-wrapper").clientHeight);
    };

    function spaceSections ()
    {   //  Who knew?!  A top margin on the first element, or a bottom margin on the last element, in an <iframe>
        //  forces scrollbars on the <iframe> that cannot be removed.  Even after the <iframe> is resized to the
        //  clientHeight property of the wrapper.  Moreover, the scrollbars remain even if the <iframe> is intentionally
        //  over-sized to compensate.
        //
        //  All of the content is visible in the <iframe>.  It only scrolls by the combined height of the margins.
        //
        //  So to space out the sections, I have to do something promatically after the page is loaded.  Since the
        //  actual height of individual sections can't be determined until the APIs return the data to render, I choose
        //  to do this with top margins which will always be the same before or after the content of the section is rendered.
        //
        //  But it can't go on the first section.

        const sections = document.getElementsByClassName ("frame-section");
        const length = sections.length;
        for (let x=1; x<length; x++)
        {   sections[x].style.marginTop = "10px";
        }
    }

    document.addEventListener ("DOMContentLoaded", event =>
    {
        spaceSections ();

        AJAX ("GET", "/api/people/getAdminPrivledges/" + getCookie ("peopleId"), xml =>
        {
            if (xml.status == 200)
            {
                doAdmin (JSON.parse(xml.responseText));
            }
            else
            {   alert ("/getAdminPrivledges\n\n" + xml.responseText);
            }
        })

        AJAX ("GET", "/api/people/getAnimalPermissions/" + getCookie ("peopleId"), xml =>
        {
            if (xml.status == 200)
            {
                doColors (JSON.parse(xml.responseText), "cat");
                doColors (JSON.parse(xml.responseText), "dog");
            }
            else
            {   alert ("/getAnimalPermissions\n\n" + xml.responseText);
            }
        })

        AJAX ("GET", "/api/people/getPerson/" + getCookie ("peopleId"), xml =>
        {
            if (xml.status == 200)
            {
                doPersonData (JSON.parse(xml.responseText));
            }
            else
            {   alert ("/getPerson\n\n" + xml.responseText);
            }
        })

        AJAX ("GET", "/api/people/hasPasswordPrivledge/" + getCookie ("peopleId"), xml =>
        {
            if (xml.status == 500)
            {   alert ("/hasPasswordPrivledge\n\n" + xml.responseText);
            }
            else
            {
                doPassword (xml.responseText == "true" ? true : false);
            }
        })
    })

    ////////////////////////////////////////////////////////////////////////////////////////////////////
    ////////////////////////////////////////////////////////////////////////////////////////////////////

    //  These are event handlers for the <input> elements, used to validate the data.

    let errors = false;

    const error =
    {   email: false,
        lock: false,
        names:
        {   given: false,
            middle: false,
            surname: false
        }
    }

    function setErrorClass (div, error)
    {
        if (error)
            div.setAttribute ("class", div.getAttribute ("class") + " error");
        else
        {   let classlist = div.getAttribute ("class");
            if (classlist != null) div.setAttribute ("class", div.getAttribute ("class").replace (" error", ""));
        }
    }

    function emailError (error)
    {
        if (error)
        {
            const div = document.getElementById ("email-error");

            configreElement ("div",
                {
                    "class": "error-text",
                    "id": "email-text",
                    "innerText": "This does not appear to be a valid e-mail address"
                },
                div);

            document.getElementById ("email-input").setAttribute ("class", getAttribute ("class") + " error");
        }
        else
        {
            document.getElementById ("email-text").remove ();
            document.getElementById ("email-input").setAttribute ("class", getAttribute ("class").replace (" error", ""));
        }
    }

    function validateEmail (event)
    {   event.preventDefault ();

        emailError (false);

        const value = document.names.email.value;
        if (value != "")
        {
            const indexAt = value.indexOf ("@");
            const indexDot = value.indexOf ("@", indexAt);

            if ((indexAt < 1) || (indexAt > (value.length - 4)))
                emailError (true);

            if ((indexDot < 5) || (indexDot > (value.length - 1)))
                emailError (true);
        }
    }

    function validateLock (event)
    {   event.preventDefault ();
    }

    function validateName (event)
    {   event.preventDefault ();
    }

    function passwordClearError (text)
    {   event.preventDefault ();

        const input = event.target;
        const section = input.parentNode;
        const errors = section.getElementsByClassName ("error-text");
        const length = errors.length;
        for (let x=0; x<length; x++)
        {
            errors[x].remove ();
        }

        setErrorClass (input, false);

        postParentMessage ();
    }

    function passwordSetError (input, text)
    {
        const section = document.getElementById ("password-section");
        configureElement ("div",
            {
                "class": "error-text",
                "innerText": text
            },
            section);

        // const input = document.getElementById ("password");
        setErrorClass (input, true);

        postParentMessage ();
    }

    function passwordValidate ()
    {   //  This function is called by the 'change password' event handler and not by an 'onchange' event on the
        //  <input> element.  Both are equally effective and efficient, but this way may seem more intuitive to the
        //  user.

        const input = document.getElementById ("password");
        const password = input.value;

        if (password == "")
        {   passwordSetError (input, "A password is required");
            return false;
        }

        if (password.length < 8)
        {   passwordSetError (input, "Password must be at least 8 characters in length");
            return false;
        }

        return true;
    }

    ////////////////////////////////////////////////////////////////////////////////////////////////////
    ////////////////////////////////////////////////////////////////////////////////////////////////////

    //  These are API requests to POST data to the server.

    function submitPassword (event)
    {   event.preventDefault ();

        if (passwordValidate ())
        {
            AJAX ("POST", "/api/people/changePassword/" + getCookie ("peopleId"), xml =>
            {
                if (xml.status == 200)
                {
                    const input = document.getElementById ("password");
                    input.value = null;
                    alert ("All good!");
                }
                else
                    alert (xml.responseText);
            },
            { "password": password } );
        }
    }

    function submitPrivledges (event)
    {   event.preventDefault ();

        let postData = [];

        let changed = 0;

        const admin = document.getElementById ("admin-privledges");
        const privledges = admin.getElementsByTagName ("input");

        const length = privledges.length;
        for (let x=0; x<length; x++)
        {
            const checked = privledges[x].checked;
            const selected = privledges[x].getAttribute ("selected") == "true" ? true : false;

            if ((checked == selected) == false)
            {   changed++;
                let o = { [privledges[x].name] : checked }
                postData.push (o);
            }
        }
        if (changed > 0)
        {
            AJAX ("POST", "/api/people/changeAdminPrivledges/" + getCookie ("peopleId"), xml =>
            {
alert (xml.status + " + " + xml.responseText);
            },
            postData);
        }
    }
</script>
